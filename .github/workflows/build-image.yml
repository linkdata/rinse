name: Build, create and publish the main container image

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      new_version:
        required: true
        type: string
      checkout_ref:
        required: false
        type: string
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
    IMAGE_NAME: ${{ github.repository }}
    IMAGE_TAGS: latest ${{ github.sha }} ${{ inputs.new_version || github.ref_name }}
    IMAGE_REGISTRY: ghcr.io
    REGISTRY_USER: ${{ github.actor }}
    REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    CGO_ENABLED: 0

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true

      - name: Generate
        run: go generate ./...
      
      - name: Debug environment
        run: |
          env
          cat rinser/version.gen.go

      # gosec taint analysis is broken
      - name: Run Gosec Security Scanner
        uses: securego/gosec@v2.24.7
        with:
          args: -exclude=G120,G703,G704,G705,G706 ./...

      - name: Build normal executable
        run: go build .
        
      - name: Build development executable 
        run: go build -tags devel -o rinse-devel .

      - name: Fetch gVisor
        working-directory: gvisor
        run: GO111MODULE=on go get gvisor.dev/gvisor/runsc@go

      - name: Build gVisor
        working-directory: gvisor
        run: CGO_ENABLED=0 GO111MODULE=on go build -o ../runsc gvisor.dev/gvisor/runsc
      
      - name: Get TIKA version
        id: tika_version
        run: |
          echo "TIKAVERSION=$(curl -s https://dlcdn.apache.org/tika/ | grep -oE '3\.[0-9]+\.[0-9]+' | head -n 1)" >> "$GITHUB_OUTPUT"

      - name: Build container image
        id: build_image
        run: |
          set -euo pipefail

          image="${IMAGE_NAME,,}"
          tags="${IMAGE_TAGS}"
          read -r -a tags_array <<< "${tags}"
          tag_args=()
          storage_driver="$(buildah info --format '{{.store.GraphDriverName}}' 2>/dev/null || true)"

          if [ "${storage_driver}" = "overlay" ] && command -v fuse-overlayfs >/dev/null 2>&1; then
            fuse_overlayfs_path="$(command -v fuse-overlayfs)"
            export STORAGE_OPTS="overlay.mount_program=${fuse_overlayfs_path}"
          fi

          for tag in "${tags_array[@]}"; do
            tag_args+=(--tag "${image}:${tag}")
          done

          buildah bud \
            --format oci \
            --build-arg "TIKAVERSION=${{ steps.tika_version.outputs.TIKAVERSION }}" \
            --file ./Dockerfile \
            "${tag_args[@]}" \
            .

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Run self-test
        id: self_test
        run: ./copyrootfs.sh "${{ steps.build_image.outputs.image }}" && podman unshare ./rinse-devel -selftest

      - name: Push image to ghcr.io
        id: push_image
        run: |
          set -euo pipefail

          image="${{ steps.build_image.outputs.image }}"
          tags="${{ steps.build_image.outputs.tags }}"
          read -r -a tags_array <<< "${tags}"
          registry_image="${IMAGE_REGISTRY}/${image}"

          echo "${REGISTRY_PASSWORD}" | podman login "${IMAGE_REGISTRY}" --username "${REGISTRY_USER}" --password-stdin

          for tag in "${tags_array[@]}"; do
            podman push --disable-content-trust "${image}:${tag}" "${registry_image}:${tag}"
          done
