name: Increment patch level then run build-image

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Git ref to checkout before running gitsemver
        required: false
        type: string
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  increment-patch-level:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.TAG_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.checkout_ref || 'main' }}

      - name: Verify checkout is main HEAD
        run: |
          git fetch origin main
          head_sha=$(git rev-parse HEAD)
          main_sha=$(git rev-parse origin/main)
          if [ "$head_sha" != "$main_sha" ]; then
            echo "::error::increment-patch must run on main HEAD. HEAD=$head_sha origin/main=$main_sha"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true

      - name: Install gitsemver
        run: go install github.com/linkdata/gitsemver@latest

      - name: Debug environment
        run: |
          env
          gitsemver -gopackage

      - name: Increment patch level
        id: version
        run: |
          tag_name="$(gitsemver -incpatch)"
          echo "TAG_NAME=$tag_name" >> "$GITHUB_OUTPUT"

  build-image:
    needs: increment-patch-level
    uses: ./.github/workflows/build-image.yml
    with:
      new_version: ${{ needs.increment-patch-level.outputs.new_version }}
      checkout_ref: ${{ needs.increment-patch-level.outputs.new_version }}
    secrets: inherit
