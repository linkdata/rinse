name: Increment patch level then run build-image

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Git ref to checkout before running gitsemver
        required: false
        type: string
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  increment-patch-level:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.TAG_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true

      - name: Install gitsemver
        run: go install github.com/linkdata/gitsemver@v1.14.0

      - name: Debug environment
        run: |
          env
          gitsemver -gopackage

      - name: Increment patch level
        id: version
        run: |
          echo -n "TAG_NAME=" >> $GITHUB_OUTPUT
          gitsemver -incpatch | tee -a $GITHUB_OUTPUT

  build-image:
    needs: increment-patch-level
    uses: ./.github/workflows/build-image.yml
    with:
      new_version: ${{ needs.increment-patch-level.outputs.new_version }}
      checkout_ref: ${{ needs.increment-patch-level.outputs.new_version }}
    secrets: inherit
