name: Dependabot merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: dependabot-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot-merge:
    runs-on: ubuntu-latest
    outputs:
      merged_by_this_run: ${{ steps.merge_pr.outputs.merged_by_this_run }}
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main' &&
      github.repository == 'linkdata/rinse'
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR when ready
        id: merge_pr
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          attempts=180
          sleep_seconds=10
          echo "merged_by_this_run=false" >> "$GITHUB_OUTPUT"

          for attempt in $(seq 1 "$attempts"); do
            pr_state=$(gh pr view "$PR_URL" --json state --jq '.state')

            if [ "$pr_state" = "MERGED" ]; then
              echo "PR is already merged by another run"
              exit 0
            fi

            if [ "$pr_state" = "CLOSED" ]; then
              echo "PR was closed without merge"
              exit 0
            fi

            if gh pr merge --merge "$PR_URL"; then
              echo "PR merged on attempt $attempt"
              echo "merged_by_this_run=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            merge_state=$(gh pr view "$PR_URL" --json mergeStateStatus --jq '.mergeStateStatus')
            echo "Merge not ready yet (mergeStateStatus=$merge_state), attempt $attempt/$attempts"
            sleep "$sleep_seconds"
          done

          echo "Timed out waiting for PR to become mergeable"
          exit 1

  increment-patch:
    needs: dependabot-merge
    if: needs.dependabot-merge.outputs.merged_by_this_run == 'true'
    uses: ./.github/workflows/increment-patch.yml
    with:
      checkout_ref: main
    secrets: inherit
